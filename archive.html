---
layout: default
title: Archive
permalink: /archive/
---
<h1>Archive</h1>
<ul class="post-list">
{% for post in site.posts %}
  <li>
    <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time><br>
    <a href="{{ post.url }}">{{ post.title | escape }}</a>
  </li>
{% endfor %}
{% for item in site.data.legacy_html %}
  <li>
    <time>{{ item.date }}</time><br>
    <a href="{{ item.url }}">{{ item.title | escape }}</a>
  </li>
{% endfor %}
</ul>
