---
layout: default
title: Home
---
<ul class="post-list">
{% for post in site.posts limit: 20 %}
  <li>
    <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time><br>
    <a href="{{ post.url }}">{{ post.title | escape }}</a>
  </li>
{% endfor %}
</ul>
<p><a href="/archive/">All posts</a></p>
